name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    services:
      nopcommerce_mssql_server:
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports:
          - 1433:1433
        env:
          SA_PASSWORD: nopCommerce_db_password
          ACCEPT_EULA: Y
          MSSQL_PID: Express
      nopcommerce:
        image: shankarask/nopcommerce-e2e:latest
        ports:
          - 8080:80
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for SQL Server to be ready
        run: |
          echo "Waiting for SQL Server on port 1433..."
          for i in {1..40}; do
            if bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null; then
              echo "✓ SQL Server port is open"
              sleep 5
              exit 0
            fi
            echo "Attempt $i/40 - waiting..."
            sleep 3
          done
          echo "✗ SQL Server never became available"
          exit 1

      - name: Wait for nopCommerce install page
        run: |
          echo "Waiting for nopCommerce install page to respond..."
          for i in {1..60}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8080/install 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Install page is up"
              exit 0
            fi
            echo "Attempt $i/60 - HTTP: $STATUS - waiting..."
            sleep 3
          done
          echo "✗ Install page never became available"
          exit 1

      - name: Install nopCommerce
        run: |
          INSTALL_HTML=$(curl -sc /tmp/nop.cookies --max-time 15 http://localhost:8080/install -s)
          TOKEN=$(echo "$INSTALL_HTML" | grep -o 'name="__RequestVerificationToken"[^>]*value="[^"]*"' | grep -o 'value="[^"]*"' | head -1 | sed 's/value="//;s/"//')
          if [ -z "$TOKEN" ]; then
            TOKEN=$(echo "$INSTALL_HTML" | grep -o '__RequestVerificationToken.*value="[^"]*"' | grep -o 'value="[^"]*"' | head -1 | sed 's/value="//;s/"//')
          fi
          echo "CSRF token: $([ -n "$TOKEN" ] && echo "found (${#TOKEN} chars)" || echo "NOT FOUND")"

          HTTP_CODE=$(curl -sb /tmp/nop.cookies -c /tmp/nop.cookies \
            -X POST http://localhost:8080/install \
            --data-urlencode "__RequestVerificationToken=$TOKEN" \
            --data-urlencode "AdminEmail=admin@test.com" \
            --data-urlencode "AdminPassword=Admin@1234" \
            --data-urlencode "ConfirmPassword=Admin@1234" \
            --data-urlencode "DataProvider=sqlserver" \
            --data-urlencode "ConnectionString=Data Source=nopcommerce_mssql_server,1433;Initial Catalog=nopcommerce;User ID=sa;Password=nopCommerce_db_password;TrustServerCertificate=True;" \
            --data-urlencode "InstallSampleData=true" \
            -s -o /tmp/install_response.html -w "%{http_code}")
          echo "Install POST HTTP status: $HTTP_CODE"
          grep -i "error\|exception\|message-error" /tmp/install_response.html | head -5 || true

      - name: Wait for nopCommerce to be ready
        run: |
          echo "Waiting for installation to complete..."
          for i in {1..120}; do
            if curl -sL --max-time 10 http://localhost:8080/login 2>/dev/null | grep -q 'login-button'; then
              echo "✓ nopCommerce is ready!"
              exit 0
            fi
            DEST=$(curl -s -L -o /dev/null -w "%{url_effective}" --max-time 5 http://localhost:8080/login 2>/dev/null)
            echo "Attempt $i/120 - redirected to: $DEST - still waiting..."
            sleep 3
          done
          echo "✗ Installation timed out — last response:"
          curl -sL http://localhost:8080/login | head -60 || true
          exit 1

      - name: Run tests
        run: npm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build 2>/dev/null || echo "No build script defined"

  deploy:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/nopcommerce-playwright
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
