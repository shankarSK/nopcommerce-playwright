name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    services:
      nopcommerce_mssql_server:
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports:
          - 1433:1433
        env:
          SA_PASSWORD: nopCommerce_db_password
          ACCEPT_EULA: Y
          MSSQL_PID: Express

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for SQL Server and restore database
        run: |
          echo "Waiting for SQL Server on port 1433..."
          for i in {1..40}; do
            if bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null; then
              echo "✓ SQL Server port is open"
              sleep 5
              break
            fi
            echo "Attempt $i/40 - waiting..."
            sleep 3
          done

          MSSQL_CONTAINER=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest" --format "{{.Names}}" | head -1)
          echo "SQL Server container: $MSSQL_CONTAINER"

          docker exec "$MSSQL_CONTAINER" mkdir -p /var/opt/mssql/backup
          docker cp nopcommerce.bak "$MSSQL_CONTAINER:/var/opt/mssql/backup/nopcommerce.bak"

          docker exec "$MSSQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "nopCommerce_db_password" -No \
            -Q "RESTORE DATABASE [nopCommerce_db] FROM DISK='/var/opt/mssql/backup/nopcommerce.bak' WITH REPLACE, RECOVERY"
          echo "✓ Database restored"

      - name: Start nopCommerce
        run: |
          MSSQL_CONTAINER=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest" --format "{{.Names}}" | head -1)
          echo "MSSQL container: $MSSQL_CONTAINER"

          echo "--- All Docker networks ---"
          docker network ls

          # Get the GitHub Actions network (exclude default bridge/host/none)
          NETWORK=$(docker network ls --format "{{.Name}}" | grep -Ev '^(bridge|host|none)$' | head -1)
          echo "Joining Docker network: $NETWORK"

          printf '{"DataProvider":"sqlserver","ConnectionString":"Server=nopcommerce_mssql_server,1433;Database=nopCommerce_db;Persist Security Info=False;User ID=sa;Password=nopCommerce_db_password;Trust Server Certificate=True;","SQLCommandTimeout":null,"RawDataSettings":{}}' \
            > /tmp/dataSettings.json
          echo "--- dataSettings.json on runner ---"
          cat /tmp/dataSettings.json

          # Start without config first so the container filesystem is initialised
          docker run -d \
            --name nopcommerce_web \
            --network "$NETWORK" \
            -p 8080:80 \
            shankarask/nopcommerce-e2e:latest

          echo "Waiting 10s for container to initialise..."
          sleep 10

          echo "--- Container status ---"
          docker ps --filter "name=nopcommerce_web"

          # Copy dataSettings.json into the running container, then restart
          docker exec nopcommerce_web mkdir -p /app/App_Data
          docker cp /tmp/dataSettings.json nopcommerce_web:/app/App_Data/dataSettings.json

          echo "--- Verify file inside container ---"
          docker exec nopcommerce_web cat /app/App_Data/dataSettings.json

          echo "Restarting nopCommerce..."
          docker restart nopcommerce_web

          echo "--- Container status after restart ---"
          docker ps --filter "name=nopcommerce_web"
          echo "✓ nopCommerce restarted with database config"

      - name: Wait for nopCommerce to be ready
        run: |
          echo "Waiting for nopCommerce to be ready..."
          for i in {1..60}; do
            BODY=$(curl -sL --max-time 10 http://localhost:8080/login 2>/dev/null || true)
            if echo "$BODY" | grep -q 'login-button'; then
              echo "✓ nopCommerce is ready!"
              exit 0
            fi
            DEST=$(curl -s -L -o /dev/null -w "%{url_effective}" --max-time 5 http://localhost:8080/login 2>/dev/null || true)
            echo "Attempt $i/60 - $DEST - waiting..."
            sleep 3
          done
          echo "✗ nopCommerce did not become ready — last response:"
          curl -sL http://localhost:8080/login 2>/dev/null | grep -o '.\{0,300\}' | head -5 || true
          echo "--- Container logs ---"
          docker logs nopcommerce_web --tail 50 || true
          exit 1

      - name: Run tests
        run: npm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build || echo "No build script defined"

  deploy:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/nopcommerce-playwright
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
