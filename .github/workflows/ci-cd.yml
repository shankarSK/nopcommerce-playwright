name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    services:
      nopcommerce_mssql_server:
        image: mcr.microsoft.com/mssql/server:2019-latest
        ports:
          - 1433:1433
        env:
          SA_PASSWORD: nopCommerce_db_password
          ACCEPT_EULA: Y
          MSSQL_PID: Express

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for SQL Server and restore database
        run: |
          echo "Waiting for SQL Server on port 1433..."
          for i in {1..40}; do
            if bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null; then
              echo "✓ SQL Server port is open"
              sleep 5
              break
            fi
            echo "Attempt $i/40 - waiting..."
            sleep 3
          done

          MSSQL_CONTAINER=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest" --format "{{.Names}}" | head -1)
          echo "SQL Server container: $MSSQL_CONTAINER"

          docker exec "$MSSQL_CONTAINER" mkdir -p /var/opt/mssql/backup
          docker cp nopcommerce.bak "$MSSQL_CONTAINER:/var/opt/mssql/backup/nopcommerce.bak"

          docker exec "$MSSQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "nopCommerce_db_password" -No \
            -Q "RESTORE DATABASE [nopCommerce_db] FROM DISK='/var/opt/mssql/backup/nopcommerce.bak' WITH REPLACE, RECOVERY"
          echo "✓ Database restored"

          echo "Configuring shipping settings..."
          docker exec "$MSSQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "nopCommerce_db_password" -No -d nopCommerce_db \
            -Q "
              UPDATE Setting SET Value='Shipping.FixedByWeightByTotal'
                WHERE Name='shippingsettings.activeshippingratecomputationmethodsystemnames';

              UPDATE Setting SET Value='True'
                WHERE Name='fixedbyweightbytotalsettings.shippingbyweightbytotalenabled';

              DELETE FROM ShippingByWeightByTotalRecord;

              INSERT INTO ShippingByWeightByTotalRecord
                (WeightFrom,WeightTo,OrderSubtotalFrom,OrderSubtotalTo,AdditionalFixedCost,
                 PercentageRateOfSubtotal,RatePerWeightUnit,LowerWeightLimit,
                 Zip,StoreId,WarehouseId,CountryId,StateProvinceId,ShippingMethodId,TransitDays)
              VALUES
                (0,9999,0,9999999,0,0,0,0,'',0,0,0,0,1,NULL),
                (0,9999,0,9999999,0,0,0,0,'',0,0,0,0,2,NULL),
                (0,9999,0,9999999,0,0,0,0,'',0,0,0,0,3,NULL);
            "

          echo "--- Verify shipping config in DB ---"
          docker exec "$MSSQL_CONTAINER" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P "nopCommerce_db_password" -No -d nopCommerce_db \
            -Q "
              SELECT Name, Value FROM Setting
                WHERE Name IN (
                  'shippingsettings.activeshippingratecomputationmethodsystemnames',
                  'fixedbyweightbytotalsettings.shippingbyweightbytotalenabled'
                );
              SELECT r.Id, r.ShippingMethodId, m.Name, r.WeightFrom, r.WeightTo
                FROM ShippingByWeightByTotalRecord r
                JOIN ShippingMethod m ON m.Id=r.ShippingMethodId;
            "
          echo "✓ Shipping configured (UPS removed, FixedByWeightByTotal enabled)"

      - name: Start nopCommerce
        run: |
          MSSQL_CONTAINER=$(docker ps --filter "ancestor=mcr.microsoft.com/mssql/server:2019-latest" --format "{{.Names}}" | head -1)
          echo "MSSQL container: $MSSQL_CONTAINER"

          # Get the GitHub Actions network (exclude default bridge/host/none)
          NETWORK=$(docker network ls --format "{{.Name}}" | grep -Ev '^(bridge|host|none)$' | head -1)
          echo "Docker network: $NETWORK"

          # Get MSSQL IP on this specific network
          MSSQL_IP=$(docker inspect "$MSSQL_CONTAINER" --format "{{(index .NetworkSettings.Networks \"${NETWORK}\").IPAddress}}")
          echo "MSSQL IP on network: $MSSQL_IP"

          # Pull image first so inspect and run don't interleave output
          docker pull shankarask/nopcommerce-e2e:latest

          echo "--- Image volumes ---"
          docker inspect shankarask/nopcommerce-e2e:latest --format '{{json .Config.Volumes}}'

          # nopCommerce 4.80 uses App_Data/appsettings.json (not dataSettings.json).
          # Write the full appsettings.json with the real connection string before dotnet starts.
          CONN_STR="Server=${MSSQL_IP},1433;Database=nopCommerce_db;Persist Security Info=False;User ID=sa;Password=nopCommerce_db_password;Encrypt=False;"
          AS_JSON=$(printf '{"ConnectionStrings":{"ConnectionString":"%s","DataProvider":"sqlserver","SQLCommandTimeout":null,"WithNoLock":false,"Collation":"","CharacterSet":""},"CacheConfig":{"DefaultCacheTime":60,"LinqDisableQueryCache":false},"CommonConfig":{"DisplayFullErrorStack":false,"UserAgentStringsPath":"~/App_Data/browscap.xml","CrawlerOnlyUserAgentStringsPath":"~/App_Data/browscap.crawlersonly.xml","CrawlerOnlyAdditionalUserAgentStringsPath":"~/App_Data/additional.crawlers.xml","UseSessionStateTempDataProvider":false,"ScheduleTaskRunTimeout":null,"StaticFilesCacheControl":"public,max-age=31536000","ServeUnknownFileTypes":false,"UseAutofac":true,"PermitLimit":0,"QueueCount":0,"RejectionStatusCode":503},"DistributedCacheConfig":{"DistributedCacheType":"redissynchronizedmemory","Enabled":false,"ConnectionString":"127.0.0.1:6379,ssl=False","SchemaName":"dbo","TableName":"DistributedCache","InstanceName":"nopCommerce","PublishIntervalMs":500},"HostingConfig":{"UseProxy":false,"ForwardedProtoHeaderName":"","ForwardedForHeaderName":"","KnownProxies":"","KnownNetworks":""},"InstallationConfig":{"DisableSampleData":false,"DisabledPlugins":"Misc.AzureBlob,Misc.CloudflareImages","InstallRegionalResources":true},"PluginConfig":{"UseUnsafeLoadAssembly":true},"WebOptimizer":{"EnableJavaScriptBundling":true,"EnableCssBundling":true,"JavaScriptBundleSuffix":".scripts","CssBundleSuffix":".styles","EnableCaching":true,"EnableMemoryCache":true,"EnableDiskCache":true,"CacheDirectory":"/app/wwwroot/bundles","EnableTagHelperBundling":false,"CdnUrl":"","AllowEmptyBundle":true,"HttpsCompression":2,"MemoryCacheTimeToLive":"01:00:00"}}' "$CONN_STR")
          AS_B64=$(printf '%s' "$AS_JSON" | base64 -w 0)
          echo "Connection string targets: $MSSQL_IP:1433"

          docker run -d \
            --name nopcommerce_web \
            --network "$NETWORK" \
            -p 8080:80 \
            -e "AS_B64=$AS_B64" \
            --entrypoint /bin/sh \
            shankarask/nopcommerce-e2e:latest \
            -c 'mkdir -p /app/App_Data && echo "$AS_B64" | base64 -d > /app/App_Data/appsettings.json && echo "=== appsettings.json written ===" && exec dotnet /app/Nop.Web.dll'

          echo "Waiting 15s for nopCommerce to initialise..."
          sleep 15

          echo "--- Container status ---"
          docker ps --filter "name=nopcommerce_web"

          echo "--- Container logs ---"
          docker logs nopcommerce_web --tail 40

          echo "--- appsettings.json ConnectionString in container ---"
          docker exec nopcommerce_web cat /app/App_Data/appsettings.json 2>&1 | grep -o '"ConnectionString":"[^"]*"' || echo "NOT FOUND"

          echo "✓ nopCommerce started"

      - name: Wait for nopCommerce to be ready
        run: |
          echo "Waiting for nopCommerce to be ready..."
          for i in {1..60}; do
            BODY=$(curl -sL --max-time 10 http://localhost:8080/login 2>/dev/null || true)
            if echo "$BODY" | grep -q 'login-button'; then
              echo "✓ nopCommerce is ready!"
              exit 0
            fi
            DEST=$(curl -s -L -o /dev/null -w "%{url_effective}" --max-time 5 http://localhost:8080/login 2>/dev/null || true)
            echo "Attempt $i/60 - $DEST - waiting..."
            sleep 3
          done
          echo "✗ nopCommerce did not become ready — last response:"
          curl -sL http://localhost:8080/login 2>/dev/null | grep -o '.\{0,300\}' | head -5 || true
          echo "--- Container logs ---"
          docker logs nopcommerce_web --tail 50 || true
          exit 1

      - name: Run tests
        run: npm run test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest
    name: Lint & Format
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build || echo "No build script defined"

  deploy:
    runs-on: ubuntu-latest
    name: Build and Push Docker Image
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/nopcommerce-playwright
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
